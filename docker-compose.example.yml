version: '3.8'

services:
  brew-guide:
    image: ghcr.io/swiftwind0405/brew-guide:v8.0.0
    container_name: brew-guide
    restart: unless-stopped
    ports:
      # 统一端口暴露（3000 包含前端+后端API）
      # Nginx 反代配置: https://coffee.stanleywind.org:88 -> http://localhost:7567
      - "7567:3000"
    environment:
      # 后端配置
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/data
      
      # 前端配置 - 使用相对路径（通过Nginx统一端口）
      # 浏览器访问 /api 会自动由Nginx转发到后端
      - NEXT_PUBLIC_API_URL=/api
      
      # CORS 配置 - 允许的来源
      - CORS_ORIGINS=https://coffee.stanleywind.org:88
      
      # 日志级别
      - LOG_LEVEL=info
    volumes:
      # SQLite 数据持久化
      - ./data:/data
      # 备份目录
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - brew-guide-network

  # 可选：自动备份服务
  backup:
    image: offen/docker-volume-backup:latest
    container_name: brew-guide-backup
    restart: unless-stopped
    environment:
      - BACKUP_CRON_EXPRESSION=0 2 * * *
      - BACKUP_RETENTION_DAYS=7
      - BACKUP_FILENAME=brew-guide-backup-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_ARCHIVE=/backups
    volumes:
      - ./data:/backup/data:ro
      - ./backups:/backups
    networks:
      - brew-guide-network
    profiles:
      - backup

networks:
  brew-guide-network:
    driver: bridge
